<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body>
<form id="reservationForm">
  <input name="name" id="name" placeholder="氏名" required>
  <input name="name_kana" id="name_kana" placeholder="フリガナ" required>
  <input name="tel" id="tel" type="tel" placeholder="電話番号" required>
  <input name="email" id="email" type="email" placeholder="メール" required>
  <select name="menu" id="menu" onchange="updateTimeSlots()"><option>カット</option><option>ヘアカラー</option></select>
  <select name="staff" id="staff" onchange="updateTimeSlots()"><option>指名なし</option><option>下鶴</option></select>
  <input type="date" id="date" name="date" onchange="updateTimeSlots()" required>
  <select id="time" name="time" disabled><option>先に日付を選択してください</option></select>
  <button type="submit" id="submit-btn">予約する</button>
</form>

<script>
window.onload = () => {
  const d = JSON.parse(localStorage.getItem('blnc_cache') || '{}');
  ['name','name_kana','tel','email'].forEach(id => document.getElementById(id).value = d[id] || "");
};

async function updateTimeSlots() {
  const [s, d, m] = [document.getElementById("staff").value, document.getElementById("date").value, document.getElementById("menu").value];
  const t = document.getElementById("time");
  if (!d) return;

  const res = await (await fetch(`?date=${d}&staff=${encodeURIComponent(s)}&menu=${encodeURIComponent(m)}`)).json();
  t.innerHTML = "";
  
  if (res.status === "STAFF_OFF") {
    t.innerHTML = '<option>公休</option>';
    t.disabled = true;
  } else if (res.bookedTimes) {
    // 時間枠生成ロジック
    t.disabled = false;
  }
}

document.getElementById('reservationForm').onsubmit = function() {
  const data = { name: document.getElementById('name').value, name_kana: document.getElementById('name_kana').value, tel: document.getElementById('tel').value, email: document.getElementById('email').value };
  localStorage.setItem('blnc_cache', JSON.stringify(data));
};
</script>
</body>
</html>
