<!-- index.html  店名LINE予約システム -->

<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>店名予約</title>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  padding:20px;
}

.box{
  max-width:420px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

h1{
  text-align:center;
}

input,select,button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}

button{
  background:#111;
  color:#fff;
  border:none;
}
</style>

</head>

<body>

<div class="box">

<h1>店名予約</h1>

<input id="name" placeholder="お名前">

<input id="tel" placeholder="電話番号">

<select id="menu">
<option>メニュー1 ¥0000</option>
<option>メニュー2 ¥0000</option>
<option>メニュー3 ¥0000</option>
<option>メニュー4 ¥0000</option>
<option>メニュー5 ¥0000</option>
</select>

<select id="staff">
<option>指名なし</option>
<option>スタッフ1</option>
<option>スタッフ2</option>
<option>スタッフ3</option>
</select>

<input type="date" id="date">

<select id="time"></select>

<button onclick="sendReserve()">予約する</button>

<p id="msg"></p>

</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>

window.onload = function(){

  const timeSelect = document.getElementById("time");

  for(let h=9; h<=18; h++){

    for(let m=0; m<60; m+=30){

      if(h==18 && m>0) continue;

      let hh=("0"+h).slice(-2);
      let mm=("0"+m).slice(-2);

      let opt = document.createElement("option");

      opt.value = hh + ":" + mm;
      opt.textContent = hh + ":" + mm;

      timeSelect.appendChild(opt);
    }
  }
}

function sendReserve(){

  const form = document.createElement("form");

  form.method = "POST";

  form.action =
  "https://script.google.com/macros/s/AKfycbwtDBT9tb55WWyKXu6jVkaDzmJW6bWeNaXhYeN9Lq0xxNNq20nwI_euMJq_2QV_m4Y/exec";

  form.target = "hidden_iframe";

  const data = {

    name:document.getElementById("name").value,

    tel:document.getElementById("tel").value,

    menu:document.getElementById("menu").value,

    staff:document.getElementById("staff").value,

    date:document.getElementById("date").value,

    time:document.getElementById("time").value
  };

  for(let key in data){

    const input = document.createElement("input");

    input.type = "hidden";

    input.name = key;

    input.value = data[key];

    form.appendChild(input);
  }

  document.body.appendChild(form);

  form.submit();

  document.getElementById("msg").innerText =
  "予約完了しました";
}

</script>

</body>
</html>
