<div class="container"> <!--[cite: 5] -->

      </div> <!--[cite: 5] -->
      新しい日時を選択して、一番下の「変更を確定する」ボタンを押してください。 <!--[cite: 5] -->
      <button type="button" class="btn-cancel-change" onclick="abortChangeMode()">➔ 変更をやめる</button> <!--[cite: 5] -->

      </div> <!--[cite: 5] -->

      <div class="form-group"> <!--[cite: 5] -->
        <label for="staff">担当スタッフ *</label> <!--[cite: 5] -->

          <option value="指名なし">指名なし (店舗全体の空き状況)</option> <!--[cite: 5] -->
          <!-- 💡【リファクタリング】Config.gsのマスターから読み込んだスタッフ名でプルダウンを動的生成 -->
          <? for (let i = 0; i < staffList.length; i++) { ?>
            <option value="<?= staffList[i] ?>"><?= staffList[i] ?></option>
          <? } ?>
        </select> <!--[cite: 5] -->
      </div> <!--[cite: 5] -->

      <div class="form-group"> <!--[cite: 5] -->
        <label for="menu">施術メニュー *</label> <!--[cite: 5] -->

          <option value="">メニューを選択してください</option> <!--[cite: 5] -->

        </select> <!--[cite: 5] -->
      </div> <!--[cite: 5] -->

      </div> <!--[cite: 5] -->

      <div class="form-group"> <!--[cite: 5] -->
        <label for="memo">ご要望・備考</label> <!--[cite: 5] -->

      </div> <!--[cite: 5] -->

      <button type="submit" id="submit-btn" class="btn-submit" disabled>上記の内容で予約を確定する</button> <!--[cite: 5] -->
    </form> <!--[cite: 5] -->
  </div> <!--[cite: 5] -->

  <div id="check-tab" class="tab-content"> <!--[cite: 5] -->
    <div class="form-group"> <!--[cite: 5] -->
      <label for="check-tel">ご登録の携帯電話番号</label> <!--[cite: 5] -->
      <input type="tel" id="check-tel" placeholder="09012345678"> <!--[cite: 5] -->
    </div> <!--[cite: 5] -->
    
    <div class="form-group"> <!--[cite: 5] -->
      <label for="check-email">ご登録のメールアドレス</label> <!--[cite: 5] -->
      <input type="email" id="check-email" placeholder="example@gmail.com"> <!--[cite: 5] -->
      <div class="note">ご予約時に入力した「電話番号」と「メールアドレス」で検索します。</div> <!--[cite: 5] -->
